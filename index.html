<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <meta
      name="description"
      content="Explore Neo N3 MainNet and TestNet blocks, transactions, addresses, tokens, contracts, network statistics, and dBFT consensus data."
    />
    <meta
      name="keywords"
      content="Neo, N3, blockchain, explorer, transactions, blocks, addresses, tokens, NEO, GAS, cryptocurrency"
    />
    <meta name="theme-color" content="#21325b" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Neo N3 Explorer | Neo3Scan" />
    <meta
      property="og:description"
      content="Explore Neo N3 MainNet and TestNet blocks, transactions, addresses, tokens, contracts, network statistics, and dBFT consensus data."
    />
    <meta property="og:image" content="https://www.neo3scan.com/img/brand/neo3scan-neo-n3-social.png" />
    <meta property="og:site_name" content="Neo3Scan" />
    <meta property="og:image:type" content="image/png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta
      property="og:image:alt"
      content="Neo3Scan Neo N3 Explorer homepage with four-network switching, blockchain search, and live network statistics."
    />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Neo N3 Explorer | Neo3Scan" />
    <meta
      name="twitter:description"
      content="Explore Neo N3 MainNet and TestNet blocks, transactions, addresses, tokens, contracts, network statistics, and dBFT consensus data."
    />
    <meta name="twitter:image" content="https://www.neo3scan.com/img/brand/neo3scan-neo-n3-social.png" />
    <meta
      name="twitter:image:alt"
      content="Neo3Scan Neo N3 Explorer homepage with four-network switching, blockchain search, and live network statistics."
    />

    <link rel="icon" href="/img/brand/favicon.png" type="image/png" />
    <link rel="apple-touch-icon" href="/img/brand/favicon.png" />
    <link rel="manifest" href="/manifest.json" crossorigin="use-credentials" />

    <!-- Establish the TCP/TLS handshake to the backup Neo RPC endpoint
         in parallel with HTML parsing so the first API call after
         hydration doesn't pay connection-setup latency. Perf trace
         showed this saves ~428ms on first render. -->
    <link rel="preconnect" href="https://rpc.n3index.dev" crossorigin />
    <!-- DNS-only hint for token logos served from these third-party
         CDNs; avoids paying DNS lookup time on the first <img> per
         token-logo source. -->
    <link rel="dns-prefetch" href="https://flamingo.finance" />
    <link rel="dns-prefetch" href="https://s2.coinmarketcap.com" />

    <script src="/theme-init.js"></script>

    <title>Neo N3 Explorer | Neo3Scan</title>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
