<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <meta
      name="description"
      content="Neo N3 Blockchain Explorer - Search transactions, blocks, addresses, tokens and contracts on Neo N3 network"
    />
    <meta
      name="keywords"
      content="Neo, N3, blockchain, explorer, transactions, blocks, addresses, tokens, NEO, GAS, cryptocurrency"
    />
    <meta name="theme-color" content="#21325b" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Neo N3 Explorer" />
    <meta
      property="og:description"
      content="Search transactions, blocks, addresses, tokens and contracts on Neo N3 network"
    />
    <meta property="og:image" content="/img/brand/oneGate.png" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:title" content="Neo N3 Explorer" />
    <meta
      property="twitter:description"
      content="Search transactions, blocks, addresses, tokens and contracts on Neo N3 network"
    />
    <meta property="twitter:image" content="/img/brand/oneGate.png" />

    <link rel="icon" href="/img/brand/favicon.png" type="image/png" />
    <link rel="apple-touch-icon" href="/img/brand/favicon.png" />
    <link rel="manifest" href="/manifest.json" crossorigin="use-credentials" />

    <!-- Establish the TCP/TLS handshake to the backup Neo RPC endpoint
         in parallel with HTML parsing so the first API call after
         hydration doesn't pay connection-setup latency. Perf trace
         showed this saves ~428ms on first render. -->
    <link rel="preconnect" href="https://rpc.n3index.dev" crossorigin />
    <!-- DNS-only hint for token logos served from these third-party
         CDNs; avoids paying DNS lookup time on the first <img> per
         token-logo source. -->
    <link rel="dns-prefetch" href="https://flamingo.finance" />
    <link rel="dns-prefetch" href="https://s2.coinmarketcap.com" />

    <title>Neo N3 Explorer</title>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
