name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality-and-build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: ["22"]

    steps:
      - name: Checkout frontend
        uses: actions/checkout@v7

      - name: Checkout backend (optional, for RPC consistency)
        id: backend_checkout
        continue-on-error: true
        uses: actions/checkout@v7
        with:
          repository: r3e-network/neo3fura
          ref: product
          path: backend/neo3fura

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Security audit (high+)
        run: npm run audit:high

      - name: Lint
        run: npm run lint

      - name: Test (Coverage)
        run: npm run test:coverage

      - name: Validate frontend/backend RPC consistency
        if: steps.backend_checkout.outcome == 'success'
        continue-on-error: true
        env:
          BACKEND_ROOT: backend/neo3fura
        run: npm run validate:rpc:ci

      - name: Skip RPC consistency validation
        if: steps.backend_checkout.outcome != 'success'
        run: echo "Backend checkout unavailable; skipping RPC consistency validation."

      - name: Build
        run: npm run build
